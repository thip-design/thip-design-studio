<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่งข้อความสำเร็จ</title>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #F5F0EB;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .thankyou-box {
            background: #FFFFFF;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        a {
            display: inline-block;
            text-decoration: none;
            background: #5C4033;
            color: #FFFFFF;
            padding: 14px 28px;
            border-radius: 999px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        a:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="thankyou-box">
        <h1>ส่งข้อความสำเร็จ 🎉</h1>
        <p>ขอบคุณที่ติดต่อเข้ามานะคะ ทางร้านจะรีบตอบกลับให้เร็วที่สุดค่ะ</p>
        <a href="index.html">กลับหน้าหลัก</a>
    </div>
</body>
</html>
